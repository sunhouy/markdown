server {
    listen 80;
    server_name md.yhsun.cn www.md.yhsun.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name md.yhsun.cn www.md.yhsun.cn;

    # SSL配置
    ssl_certificate    /www/server/panel/vhost/cert/md.yhsun.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/md.yhsun.cn/privkey.pem;
    
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml+rss application/json;

    # 静态资源缓存策略
    # 带 hash 的资源：长期缓存（1年）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot).*-[a-f0-9]{8,}\. {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 普通静态资源：较短缓存（7天），但每次都检查更新
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Service Worker：不缓存
    location ~* /sw\.js$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # HTML：每次都检查更新
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # 代理配置
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
