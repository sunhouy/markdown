name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要发布到 GitHub Release 的 tag（例如 v1.2.3；留空则使用当前 ref 的 tag）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Clean workspace (node_modules)
      run: |
        rm -rf node_modules
        rm -rf **/node_modules || true

    - name: Install dependencies
      run: npm install

    # - name: Run tests
      # run: npm test
      # 测试存在问题，暂时跳过

    - name: Build frontend
      run: npm run build

    - name: Clean up server directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          target_dir="/www/wwwroot/js"
          if [ -d "$target_dir" ]; then
            cd "$target_dir"
            find . -maxdepth 1 -mindepth 1 ! -name '.env' ! -name 'uploads' ! -name 'user_uploads' ! -name 'user_files' -exec rm -rf {} +
          fi

    - name: Upload files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        # PWA 资源（sw.js / manifest / icons）必须部署到站点根目录，否则 /sw.js 会回退为 index.html 导致 MIME 错误
        source: "dist,api,print,package.json,package-lock.json,nginx.conf,sw.js,manifest.webmanifest,icon-192.png,icon-512.png"
        target: "/www/wwwroot/js"
        strip_components: 0

    - name: Install dependencies on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /www/wwwroot/js
          # 确保不会因为历史残留导致安装异常
          rm -rf node_modules
          # 安装生产依赖
          npm install --omit=dev
          
          # PM2 启动/重启服务
          if pm2 describe md-server > /dev/null; then
            pm2 restart md-server
          else
            pm2 start api/server.js --name "md-server"
          fi
          
          # 配置 Nginx (md.yhsun.cn)
          if [ -f "nginx.conf" ]; then
            mv nginx.conf /www/server/panel/vhost/nginx/md.yhsun.cn.conf
          fi
          
          # 配置 Nginx (print.yhsun.cn)
          if [ -f "print/nginx_print_server.conf" ]; then
            mv print/nginx_print_server.conf /www/server/panel/vhost/nginx/print.yhsun.cn.conf
          fi
          
          service nginx reload
          
    - name: Setup and start print server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /www/wwwroot/js/print
          
          # 检查 Python3 是否可用
          if command -v python3 &> /dev/null; then
            PYTHON_CMD=python3
          elif command -v python &> /dev/null; then
            PYTHON_CMD=python
          else
            echo "错误: 未找到 Python"
            exit 1
          fi
          
          echo "使用 Python: $PYTHON_CMD"
          
          # 安装 Python 依赖
          if [ -f "requirements.txt" ]; then
            echo "正在安装 Python 依赖..."
            $PYTHON_CMD -m pip install --upgrade pip
            $PYTHON_CMD -m pip install -r requirements.txt
          fi
          
          # 使用 PM2 管理打印服务器
          echo "启动/重启打印服务器..."
          
          # 停止旧的打印服务器（如果存在）
          if pm2 describe print-server > /dev/null 2>&1; then
            echo "正在重新启动打印服务器..."
            pm2 stop print-server
            pm2 delete print-server
          fi
          
          # 启动新的打印服务器
          # 使用 --host 0.0.0.0 和 --port 8770，默认禁用自动偏移以确保 Nginx 代理正确
          echo "启动打印服务器在 0.0.0.0:8770..."
          pm2 start print_server.py --name "print-server" --interpreter "$PYTHON_CMD" -- --host 0.0.0.0 --port 8770
          
          # 保存 PM2 配置
          pm2 save
          
          echo "打印服务器已成功启动或重连！"
          pm2 list



  # 打包 Electron 桌面应用 - 仅构建并上传 artifact
  build-electron:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:electron:win
            artifactName: md-electron-win
          - os: ubuntu-latest
            script: build:electron:linux
            artifactName: md-electron-linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Build Electron app (${{ matrix.script }})
        run: npm run ${{ matrix.script }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            dist-electron-new/**
          if-no-files-found: warn

  publish-electron-release:
    needs: build-electron
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - name: Download Windows Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-win
          path: downloads/electron/win

      - name: Download Linux Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-linux
          path: downloads/electron/linux

      - name: Upload Electron assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            downloads/electron/**/*

  # 检查 print_client.py 是否变更
  check-print-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.print }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          print:
            - 'print/print_client.py'

  # 构建打印客户端（条件执行）
  build-print-client:
    needs: check-print-changes
    if: needs.check-print-changes.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
          - os: ubuntu-latest
            target: linux
            ext: ''
          - os: macos-latest
            target: macos
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install -r print/requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --console --name print_client_${{ matrix.target }} print/print_client.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: print_client_${{ matrix.target }}
        path: dist/print_client_${{ matrix.target }}${{ matrix.ext }}

  # 部署打印客户端到服务器
  deploy-print-client:
    needs: build-print-client
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_windows
        path: downloads
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_linux
        path: downloads
        
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_macos
        path: downloads
        
    - name: Create target directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: mkdir -p /www/wwwroot/static

    - name: Upload to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "downloads/*"
        target: "/www/wwwroot/static"
        strip_components: 1



  # 新增：部署 Electron 应用安装包到服务器
  deploy-electron:
    needs: build-electron
    runs-on: ubuntu-latest
    steps:
      # 下载 Windows 产物
      - name: Download Windows Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-win
          path: downloads/electron/win

      # 下载 Linux 产物
      - name: Download Linux Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: md-electron-linux
          path: downloads/electron/linux

      # 在服务器上创建对应目录
      - name: Create electron directories on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /www/wwwroot/static/electron/win
            mkdir -p /www/wwwroot/static/electron/linux

      # 上传 Windows 产物
      - name: Upload Windows Electron artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "downloads/electron/win/*"
          target: "/www/wwwroot/static/electron/win"
          strip_components: 3   # 去除 downloads/electron/win/ 前缀

      # 上传 Linux 产物
      - name: Upload Linux Electron artifacts
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "downloads/electron/linux/*"
          target: "/www/wwwroot/static/electron/linux"
          strip_components: 3   # 去除 downloads/electron/linux/ 前缀
