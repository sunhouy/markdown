name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Clean workspace (node_modules)
      run: |
        rm -rf node_modules
        rm -rf **/node_modules || true

    - name: Install dependencies
      run: npm install

    # - name: Run tests
      # run: npm test
      # 测试存在问题，暂时跳过

    - name: Build frontend
      run: npm run build

    - name: Clean up server directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          target_dir="/www/wwwroot/js"
          if [ -d "$target_dir" ]; then
            cd "$target_dir"
            find . -maxdepth 1 -mindepth 1 ! -name '.env' ! -name 'uploads' ! -name 'user_uploads' ! -name 'user_files' -exec rm -rf {} +
          fi

    - name: Upload files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        # PWA 资源（sw.js / manifest / icons）必须部署到站点根目录，否则 /sw.js 会回退为 index.html 导致 MIME 错误
        source: "dist,api,package.json,package-lock.json,nginx.conf,sw.js,manifest.webmanifest,icon-192.png,icon-512.png"
        target: "/www/wwwroot/js"
        strip_components: 0

    - name: Install dependencies on server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: |
          cd /www/wwwroot/js
          # 确保不会因为历史残留导致安装异常
          rm -rf node_modules
          # 安装生产依赖
          npm install --omit=dev
          
          # PM2 启动/重启服务
          if pm2 describe md-server > /dev/null; then
            pm2 restart md-server
          else
            pm2 start api/server.js --name "md-server"
          fi
          
          # 配置 Nginx
          if [ -f "nginx.conf" ]; then
            mv nginx.conf /www/server/panel/vhost/nginx/md.yhsun.cn.conf
            service nginx reload
          fi

  # 打包 H5Pack 移动应用资源（供下载）
  build-h5pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app for mobile H5Pack
        run: npm run build

      - name: Archive dist as H5Pack bundle
        run: |
          mkdir -p artifacts
          cd dist
          zip -r ../artifacts/md-h5pack-web.zip .

      - name: Upload H5Pack bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-h5pack-web
          path: artifacts/md-h5pack-web.zip

      # 新增：创建服务器目标目录并上传 H5Pack 产物
      - name: Create static/h5pack directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/h5pack

      - name: Upload H5Pack bundle to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "artifacts/md-h5pack-web.zip"
          target: "/www/wwwroot/static/h5pack"
          strip_components: 1

  # 打包 Electron 桌面应用（Windows exe + Linux 安装包），Artifacts 可在 Actions 中下载
  build-electron:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: build:electron:win
            artifactName: md-electron-win
          - os: ubuntu-latest
            script: build:electron:linux
            artifactName: md-electron-linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Build Electron app (${{ matrix.script }})
        run: npm run ${{ matrix.script }}

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: |
            dist-electron/**
            release/**
          if-no-files-found: warn

      # 新增：根据操作系统创建不同的子目录并上传 Electron 产物
      - name: Create static/electron directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/electron/${{ matrix.os == 'windows-latest' && 'win' || 'linux' }}

      - name: Upload Electron artifacts to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "release/*"
          target: "/www/wwwroot/static/electron/${{ matrix.os == 'windows-latest' && 'win' || 'linux' }}"
          strip_components: 1

  check-print-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.print }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          print:
            - 'print/print_client.py'

  build-print-client:
    needs: check-print-changes
    if: needs.check-print-changes.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
          - os: ubuntu-latest
            target: linux
            ext: ''
          - os: macos-latest
            target: macos
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install -r print/requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --console --name print_client_${{ matrix.target }} print/print_client.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: print_client_${{ matrix.target }}
        path: dist/print_client_${{ matrix.target }}${{ matrix.ext }}

  deploy-print-client:
    needs: build-print-client
    runs-on: ubuntu-latest
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_windows
        path: downloads
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_linux
        path: downloads
        
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: print_client_macos
        path: downloads
        
    - name: Create target directory
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        script: mkdir -p /www/wwwroot/static

    - name: Upload to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        source: "downloads/*"
        target: "/www/wwwroot/static"
        strip_components: 1