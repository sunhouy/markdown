name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync

      - name: Generate Android signing key
        id: generate-key
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -base64 16)
          KEY_ALIAS="easypocketmd"
          KEY_PASSWORD=$(openssl rand -base64 16)
          
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_OUTPUT
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_OUTPUT
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_OUTPUT
          
          keytool -genkey -v -keystore android/app/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keypass "$KEY_PASSWORD" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=EasyPocketMD, OU=Development, O=EasyPocketMD, L=Beijing, ST=Beijing, C=CN"

      - name: Configure Gradle for signing
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "cn.yhsun.md"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "cn.yhsun.md"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 1
                  versionName "1.0.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                  aaptOptions {
                     ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
                  }
              }
              signingConfigs {
                  release {
                      if (project.hasProperty('RELEASE_STORE_FILE')) {
                          storeFile file(RELEASE_STORE_FILE)
                          storePassword RELEASE_STORE_PASSWORD
                          keyAlias RELEASE_KEY_ALIAS
                          keyPassword RELEASE_KEY_PASSWORD
                      }
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.release
                  }
              }
          }

          repositories {
              google()
              mavenCentral()
              flatDir {
                  dirs 'libs'
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
              implementation "androidx.core:core-splashscreen:1.0.1"
              implementation project(':capacitor-android')
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }

          apply from: 'capacitor.build.gradle'

          try {
              def servicesJSON = file('google-services.json')
              if (servicesJSON.text) {
                  apply plugin: 'com.google.gms.google-services'
              }
          } catch(Exception e) {
              logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
          }
          EOF
          
          cat > android/gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=${{ steps.generate-key.outputs.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ steps.generate-key.outputs.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ steps.generate-key.outputs.KEY_PASSWORD }}
          EOF

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easypocketmd-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload keystore as artifact (keep for future reference)
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            android/app/release.keystore
            android/gradle.properties

  deploy-android:
    needs: build-android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: easypocketmd-android-apk
          path: downloads/android

      - name: Create android directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/android

      - name: Upload APK to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "downloads/android/*"
          target: "/www/wwwroot/static/android"
          strip_components: 2
