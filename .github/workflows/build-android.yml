name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '要发布到 GitHub Release 的 tag（例如 v1.2.3；留空则使用当前 ref 的 tag）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync

      - name: Generate Android Assets (Icons & Splash)
        run: |
          # 确保 assets 目录存在并包含图标
          mkdir -p assets
          if [ -f "icon.png" ]; then
            cp icon.png assets/icon.png
          fi
          # 生成 Android 资源文件
          npm run cap:assets

      - name: Setup Android signing keystore (from secrets)
        env:
          JKS_BASE64: ${{ secrets.JKS_BASE64 }}
        run: |
          mkdir -p android/app
          printf '%s' "$JKS_BASE64" | base64 --decode > android/app/release.keystore
          chmod 600 android/app/release.keystore

      - name: Configure Gradle for signing
        env:
          JKS_ALIAS: ${{ secrets.JKS_ALIAS }}
          JKS_PASSWORD: ${{ secrets.JKS_PASSWORD }}
        run: |
          cat > android/app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "cn.yhsun.md"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "cn.yhsun.md"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 1
                  versionName "1.0.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                  aaptOptions {
                     ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
                  }
              }
              signingConfigs {
                  release {
                      if (project.hasProperty('RELEASE_STORE_FILE')) {
                          storeFile file(RELEASE_STORE_FILE)
                          storePassword RELEASE_STORE_PASSWORD
                          keyAlias RELEASE_KEY_ALIAS
                          keyPassword RELEASE_KEY_PASSWORD
                      }
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                      signingConfig signingConfigs.release
                  }
              }
          }

          repositories {
              google()
              mavenCentral()
              flatDir {
                  dirs 'libs'
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
              implementation "androidx.core:core-splashscreen:1.0.1"
              implementation project(':capacitor-android')
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }

          apply from: 'capacitor.build.gradle'

          try {
              def servicesJSON = file('google-services.json')
              if (servicesJSON.text) {
                  apply plugin: 'com.google.gms.google-services'
              }
          } catch(Exception e) {
              logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
          }
          EOF
          
          cat > android/gradle.properties << EOF
          android.useAndroidX=true
          android.enableJetifier=true
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$JKS_PASSWORD
          RELEASE_KEY_ALIAS=$JKS_ALIAS
          RELEASE_KEY_PASSWORD=$JKS_PASSWORD
          EOF

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: easypocketmd-android-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  publish-release:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    concurrency:
      group: gh-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: easypocketmd-android-apk
          path: downloads/android

      - name: Prepare release asset
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          mkdir -p release-assets
          cp downloads/android/app-release.apk "release-assets/easypocketmd-android-${RELEASE_TAG}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref_name }}
          files: |
            release-assets/*.apk

  deploy-android:
    needs: build-android
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: easypocketmd-android-apk
          path: downloads/android

      - name: Create android directory on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p /www/wwwroot/static/android

      - name: Upload APK to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "downloads/android/*"
          target: "/www/wwwroot/static/android"
          strip_components: 2
