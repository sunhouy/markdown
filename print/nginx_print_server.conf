# 打印服务器 Nginx 配置
# 将此文件保存为 /www/server/panel/vhost/nginx/print.yhsun.cn.conf
# 然后运行: service nginx reload

server {
    listen 80;
    server_name print.yhsun.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name print.yhsun.cn;

    # SSL配置 - 使用与 md.yhsun.cn 相同的证书，或者申请单独的证书
    ssl_certificate    /www/server/panel/vhost/cert/md.yhsun.cn/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/md.yhsun.cn/privkey.pem;
    
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # WebSocket 代理到打印服务器
    location / {
        proxy_pass http://127.0.0.1:8770;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持 - 这是关键！
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
